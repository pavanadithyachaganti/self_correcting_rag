<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>self-correcting rag</title>
<style>
  :root {
    --bg: #0d0e10; --panel: #15171a; --panel2: #1b1e22; --line: #262a30;
    --text: #e7e8ea; --muted: #9aa1a9; --faint: #6b727b;
    --ok: #3ddc97; --warn: #e0a83e; --bad: #e06c5b; --accent: #3ddc97;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); }
  body { font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  .wrap { max-width: 780px; margin: 0 auto; padding: 22px 20px 96px; }

  header { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding-bottom: 22px; border-bottom: 1px solid var(--line); margin-bottom: 30px; }
  .brand { font-family: var(--mono); font-size: 13.5px; letter-spacing: .04em; color: var(--text); }
  .brand .caret { display: inline-block; width: 7px; height: 15px; background: var(--accent);
    margin-left: 5px; vertical-align: -2px; animation: blink 1.15s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .health { font-family: var(--mono); font-size: 11px; color: var(--faint); text-align: right;
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .health b { color: var(--muted); font-weight: 400; }
  .tag { border: 1px solid var(--line); border-radius: 5px; padding: 2px 7px; }

  h1.lede { font-size: 22px; font-weight: 500; letter-spacing: -.01em; margin: 4px 0 6px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 22px; }

  .askrow { display: flex; gap: 8px; }
  input#q { flex: 1; background: var(--panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 13px 14px; font-size: 15px; font-family: var(--sans); outline: none; }
  input#q:focus { border-color: #39414a; }
  input#q::placeholder { color: var(--faint); }
  button.send { background: var(--accent); color: #072016; border: none; border-radius: 10px;
    padding: 0 18px; font-weight: 500; font-size: 14px; cursor: pointer; }
  button.send:disabled { opacity: .5; cursor: default; }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
  .chip { font-size: 12.5px; color: var(--muted); background: var(--panel); border: 1px solid var(--line);
    border-radius: 999px; padding: 5px 11px; cursor: pointer; }
  .chip:hover { border-color: #39414a; color: var(--text); }

  .banner { margin-top: 16px; font-size: 12.5px; color: var(--warn);
    border: 1px solid rgba(224,168,62,.28); background: rgba(224,168,62,.06);
    border-radius: 8px; padding: 9px 12px; font-family: var(--mono); }

  .result { margin-top: 30px; animation: rise .28s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px 18px; }
  .answer { font-size: 15.5px; line-height: 1.72; white-space: pre-wrap; }
  .answer strong { font-weight: 600; }
  .src { display: inline-flex; align-items: center; font-family: var(--mono); font-size: 11.5px;
    color: var(--accent); background: rgba(61,220,151,.08); border: 1px solid rgba(61,220,151,.22);
    border-radius: 5px; padding: 1px 6px; margin: 0 1px; }
  .srcs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }

  .label { font-family: var(--mono); font-size: 11px; letter-spacing: .09em; text-transform: uppercase;
    color: var(--faint); margin: 26px 0 11px; }
  .meters { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .meter { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px 13px; }
  .meter .mtop { display: flex; justify-content: space-between; align-items: baseline; }
  .meter .mname { font-family: var(--mono); font-size: 11.5px; color: var(--muted); }
  .meter .mval { font-family: var(--mono); font-size: 16px; }
  .track { height: 5px; background: #23272d; border-radius: 3px; margin-top: 9px; overflow: hidden; }
  .fill { height: 100%; border-radius: 3px; width: 0; transition: width .5s ease; }

  .meta { font-family: var(--mono); font-size: 11.5px; color: var(--faint); margin-top: 12px;
    display: flex; gap: 14px; flex-wrap: wrap; }

  .trace { margin-top: 6px; }
  .trace-list { position: relative; margin: 4px 0 0; padding-left: 22px; }
  .trace-list::before { content: ""; position: absolute; left: 5px; top: 6px; bottom: 6px;
    width: 1px; background: var(--line); }
  .tstep { position: relative; padding: 9px 0; border-bottom: 1px dashed rgba(38,42,48,.7); }
  .tstep:last-child { border-bottom: none; }
  .tstep::before { content: ""; position: absolute; left: -20px; top: 15px; width: 9px; height: 9px;
    border-radius: 50%; background: var(--panel2); border: 1.5px solid #39414a; }
  .tstep.correction::before { background: var(--warn); border-color: var(--warn); }
  .tstep.check::before { background: var(--accent); border-color: var(--accent); }
  .trow { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .tname { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .tstep.correction .tname { color: var(--warn); }
  .tms { font-family: var(--mono); font-size: 11px; color: var(--faint); white-space: nowrap; }
  .tdetail { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .tscore { font-family: var(--mono); font-size: 11px; border-radius: 5px; padding: 1px 6px;
    border: 1px solid var(--line); margin-left: 8px; }

  .evalbtn { margin-top: 30px; }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line);
    border-radius: 9px; padding: 9px 14px; font-size: 13px; font-family: var(--mono); cursor: pointer; }
  button.ghost:hover { color: var(--text); border-color: #39414a; }
  .perq { margin-top: 12px; }
  .perq-row { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0;
    border-bottom: 1px dashed rgba(38,42,48,.7); font-size: 13px; }
  .perq-row .q { color: var(--muted); }
  .perq-row .s { font-family: var(--mono); font-size: 11.5px; color: var(--faint); white-space: nowrap; }
  .hidden { display: none; }
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid #0a2018;
    border-top-color: transparent; border-radius: 50%; animation: sp .7s linear infinite; vertical-align: -2px; }
  @keyframes sp { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  @media (max-width: 560px) { .meters { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">self-correcting-rag<span class="caret"></span></div>
    <div class="health" id="health"></div>
  </header>

  <h1 class="lede">Ask the knowledge base</h1>
  <p class="sub">Every answer is graded for relevance, verified for faithfulness, and returned with its full reasoning trace.</p>

  <div class="askrow">
    <input id="q" placeholder="e.g. What is reciprocal rank fusion?" autocomplete="off" />
    <button class="send" id="send">Ask</button>
  </div>
  <div class="chips" id="chips"></div>
  <div id="banner"></div>

  <div id="result"></div>

  <div class="evalbtn">
    <button class="ghost" id="evalbtn">run eval suite</button>
    <div id="evalout"></div>
  </div>
</div>

<script>
const EXAMPLES = [
  "What is reciprocal rank fusion?",
  "How does corrective RAG handle bad retrieval?",
  "Why use a cross-encoder for reranking?",
  "What does the faithfulness metric measure?"
];
const $ = (s) => document.querySelector(s);
const esc = (t) => t.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function fmtAnswer(t) {
  let h = esc(t);
  h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  h = h.replace(/\[([^\]]+?\.(?:md|txt)|web)\]/g, '<span class="src">$1</span>');
  return h;
}
function scoreColor(v) { return v >= 0.7 ? "var(--ok)" : v >= 0.4 ? "var(--warn)" : "var(--bad)"; }

function meter(name, v) {
  return `<div class="meter"><div class="mtop"><span class="mname">${name}</span>
    <span class="mval" style="color:${scoreColor(v)}">${v.toFixed(2)}</span></div>
    <div class="track"><div class="fill" style="background:${scoreColor(v)}" data-w="${Math.round(v*100)}"></div></div></div>`;
}

function traceRow(s) {
  const cls = s.meta && s.meta.correction ? "correction"
    : (s.name === "grade_relevance" || s.name === "check_faithfulness") ? "check" : "";
  let chip = "";
  if (s.meta && typeof s.meta.score === "number") {
    chip = `<span class="tscore" style="color:${scoreColor(s.meta.score)};border-color:${scoreColor(s.meta.score)}33">score ${s.meta.score.toFixed(2)}</span>`;
  }
  return `<div class="tstep ${cls}"><div class="trow">
    <span class="tname">${s.name}${chip}</span>
    <span class="tms">${s.duration_ms.toFixed(1)} ms</span></div>
    <div class="tdetail">${esc(s.detail || "")}</div></div>`;
}

function renderResult(r) {
  const srcs = r.sources.map(s => `<span class="src">${esc(s)}</span>`).join("");
  const html = `
   <div class="result">
     <div class="panel"><div class="answer">${fmtAnswer(r.answer)}</div>
       ${srcs ? `<div class="srcs">${srcs}</div>` : ""}</div>
     <div class="label">trust scores</div>
     <div class="meters">
       ${meter("faithfulness", r.scores.faithfulness)}
       ${meter("context precision", r.scores.context_precision)}
       ${meter("answer relevancy", r.scores.answer_relevancy)}
     </div>
     <div class="meta"><span>provider: ${r.provider}</span><span>latency: ${r.total_ms.toFixed(0)} ms</span>
       <span>steps: ${r.trace.length}</span></div>
     <div class="label">reasoning trace</div>
     <div class="trace"><div class="trace-list">${r.trace.map(traceRow).join("")}</div></div>
   </div>`;
  $("#result").innerHTML = html;
  requestAnimationFrame(() => document.querySelectorAll(".fill").forEach(f => f.style.width = f.dataset.w + "%"));
}

async function ask(q) {
  const question = (q || $("#q").value).trim();
  if (!question) return;
  $("#q").value = question;
  $("#send").disabled = true;
  $("#send").innerHTML = '<span class="spin"></span>';
  $("#result").innerHTML = `<div class="result"><div class="meta">running agent: retrieve, grade, generate, verify...</div></div>`;
  try {
    const res = await fetch("/api/query", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }) });
    if (!res.ok) throw new Error("Request failed (" + res.status + ")");
    renderResult(await res.json());
  } catch (e) {
    $("#result").innerHTML = `<div class="result"><div class="banner">${esc(e.message)}. Is the backend running?</div></div>`;
  } finally {
    $("#send").disabled = false;
    $("#send").textContent = "Ask";
  }
}

async function runEval() {
  const btn = $("#evalbtn");
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> running suite';
  $("#evalout").innerHTML = "";
  try {
    const res = await fetch("/api/eval", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({}) });
    const d = await res.json();
    const rows = d.per_question.map(p => `<div class="perq-row"><span class="q">${esc(p.question)}</span>
      <span class="s">f ${p.scores.faithfulness.toFixed(2)} · p ${p.scores.context_precision.toFixed(2)} · r ${p.scores.answer_relevancy.toFixed(2)}</span></div>`).join("");
    $("#evalout").innerHTML = `<div class="result">
      <div class="label">suite average · ${d.n} questions</div>
      <div class="meters">${meter("faithfulness", d.faithfulness)}${meter("context precision", d.context_precision)}${meter("answer relevancy", d.answer_relevancy)}</div>
      <div class="perq">${rows}</div></div>`;
    requestAnimationFrame(() => document.querySelectorAll("#evalout .fill").forEach(f => f.style.width = f.dataset.w + "%"));
  } catch (e) {
    $("#evalout").innerHTML = `<div class="banner">${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = "run eval suite";
  }
}

async function loadHealth() {
  try {
    const d = await (await fetch("/api/health")).json();
    $("#health").innerHTML = `<span class="tag"><b>llm</b> ${d.provider}</span>
      <span class="tag"><b>embed</b> ${d.embedder}</span>
      <span class="tag"><b>store</b> ${d.vector_backend}</span>`;
    if (d.provider === "mock") {
      $("#banner").innerHTML = `<div class="banner">provider = mock · answers are placeholders. add a free GROQ_API_KEY or GEMINI_API_KEY in .env for real answers. the full pipeline, scores and trace are live.</div>`;
    }
  } catch (e) { $("#health").textContent = "backend offline"; }
}

$("#chips").innerHTML = EXAMPLES.map(e => `<span class="chip">${e}</span>`).join("");
$("#chips").querySelectorAll(".chip").forEach(c => c.onclick = () => ask(c.textContent));
$("#send").onclick = () => ask();
$("#q").addEventListener("keydown", e => { if (e.key === "Enter") ask(); });
$("#evalbtn").onclick = runEval;
loadHealth();
</script>
</body>
</html>
