services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - EMBEDDER=${EMBEDDER:-sentence-transformers}
      - VECTOR_BACKEND=${VECTOR_BACKEND:-numpy}
